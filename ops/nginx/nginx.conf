# ─── Connection upgrade map (for WebSocket/HMR) ──────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Upstream definitions ────────────────────────────────────────────
upstream api_backend {
    server api:8000;
    keepalive 64;
}

upstream webapp_frontend {
    server webapp:3000;
    keepalive 64;
}

# ─── Rate limiting zones ─────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:5m rate=2r/s;

server {
    listen 80;
    server_name _;

    # Docker DNS resolver — re-resolve container names dynamically.
    # Prevents 502 after container restart (IP change).
    resolver 127.0.0.11 valid=30s;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Hide backend info & avoid duplicate headers
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header Referrer-Policy;

    # Upload size limit (match MAX_UPLOAD_SIZE_MB)
    client_max_body_size 50m;

    # ── Gzip compression ──────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml
        application/wasm;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # ── NextAuth routes → Next.js webapp ──────────────────────────────
    # Must be BEFORE /api/ to intercept NextAuth requests
    location /api/auth/ {
        proxy_pass http://webapp_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ── API gateway proxy → Next.js Route Handler ─────────────────────
    # Browser calls /api/bep/... → Next.js proxy reads JWT from session
    # and forwards to backend. Token never exposed to browser JS.
    # Must be BEFORE /api/ to intercept gateway requests.
    location /api/bep/ {
        proxy_pass http://webapp_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # SSE support: disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_max_temp_file_size 0;

        # Long timeout for SSE connections
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── SSE streaming (chat) — direct backend for server-side/curl testing ──
    # NOTE: Frontend uses /api/bep/chat/stream (through Next.js JWT proxy).
    # This route is kept for server-side/curl testing only.
    # Backend still validates JWT in Authorization header.
    # Must be BEFORE /api/ block to match first.
    location /api/v1/chat/stream {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # SSE: disable all buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding off;
        proxy_max_temp_file_size 0;

        # Long timeout — keep connection alive for extended sessions
        proxy_connect_timeout 10s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API routes (FastAPI backend) ──────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Failover: try next upstream on error/timeout/5xx
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_non_idempotent off;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Demo UI (app/view/) ──────────────────────────────────────────
    location /view/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ── Next.js frontend ─────────────────────────────────────────────
    location / {
        proxy_pass http://webapp_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Next.js HMR (hot module replacement) in dev
        proxy_read_timeout 86400s;
    }

    # ── Static assets caching ────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://webapp_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets aggressively
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (internal) ──────────────────────────────────────
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
