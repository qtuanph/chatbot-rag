version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/chatbot-api"
    schedule:
      interval: "monthly"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 20
    groups:
      all-python-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/chatbot-webapp"
    schedule:
      interval: "monthly"
      time: "03:15"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 20
    groups:
      all-webapp-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"