<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Chat Demo</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Marked.js cho Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .chat-card {
            height: 90vh;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            border-bottom: none;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background-color: #ffffff;
            scroll-behavior: smooth;
        }
        .message-wrapper {
            display: flex;
            margin-bottom: 1rem;
            animation: slideInUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }
        .message-wrapper.user {
            justify-content: flex-end;
        }
        .message-wrapper.bot {
            justify-content: flex-start;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1.25rem;
            line-height: 1.6;
        }
        .user-msg {
            background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
            color: white;
            border-radius: 1.2rem 1.2rem 0 1.2rem;
            box-shadow: 0 2px 5px rgba(13, 110, 253, 0.2);
        }
        .bot-msg {
            background-color: #f8f9fa;
            color: #212529;
            border: 1px solid #e9ecef;
            border-radius: 1.2rem 1.2rem 1.2rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        /* Markdown rendering styles */
        .bot-msg p { margin-bottom: 0.75rem; }
        .bot-msg p:last-child { margin-bottom: 0; }
        .bot-msg pre {
            background-color: #212529;
            color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 0.5rem;
        }
        .bot-msg code {
            color: #d63384;
            background-color: rgba(214, 51, 132, 0.1);
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }
        .bot-msg pre code {
            color: inherit;
            background: none;
            padding: 0;
        }
        .bot-msg table {
            width: 100%;
            margin-bottom: 1rem;
            border-collapse: collapse;
        }
        .bot-msg th, .bot-msg td {
            padding: 0.5rem;
            border: 1px solid #dee2e6;
        }
        .bot-msg blockquote {
            border-left: 4px solid #ced4da;
            padding-left: 1rem;
            color: #6c757d;
            font-style: italic;
        }
        .system-msg {
            text-align: center;
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 1.5rem;
        }
        .input-area {
            background-color: #f8f9fa;
            padding: 1.25rem;
            border-top: 1px solid #e9ecef;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            border-color: #86b7fe;
        }
        .btn-send {
            transition: all 0.2s;
        }
        .btn-send:hover {
            transform: translateY(-1px);
        }
        .typing-indicator {
            display: inline-block;
            font-style: italic;
            color: #6c757d;
        }
        .typing-indicator::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="card chat-card border-0">
                <!-- Header -->
                <div class="card-header chat-header p-4">
                    <h4 class="mb-3 fw-semibold">Tenant Integration Demo</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-light opacity-75 small mb-1">API Endpoint</label>
                            <input type="text" id="apiEndpoint" class="form-control form-control-sm bg-dark text-light border-secondary" value="https://api.qtuanph.dev/v1/chat/completions" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light opacity-75 small mb-1">API Key</label>
                            <input type="text" id="apiKey" class="form-control form-control-sm bg-dark text-light border-secondary" value="trg_m4aMKVkNLpnAxHok1I9wW9kcwohHwrQVw7Z16emQnqw" />
                        </div>
                    </div>
                </div>
                
                <!-- Chat Box -->
                <div class="card-body chat-box d-flex flex-column" id="chatBox">
                    <div class="system-msg">Chat initialized. Gửi tin nhắn để kiểm tra kết nối với Public API.</div>
                </div>
                
                <!-- Input Area -->
                <div class="card-footer input-area">
                    <form id="chatForm" class="d-flex gap-2" onsubmit="event.preventDefault(); sendMessage();">
                        <input type="text" id="messageInput" class="form-control form-control-lg border-0 shadow-sm" placeholder="Nhập câu hỏi của bạn..." autocomplete="off" />
                        <button type="submit" id="sendBtn" class="btn btn-primary btn-lg px-4 shadow-sm btn-send">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-send-fill" viewBox="0 0 16 16">
                                <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471z"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Cấu hình Marked.js an toàn hơn (nếu cần, nhưng demo thì để mặc định)
    marked.setOptions({
        breaks: true, // Hỗ trợ xuống dòng bằng Enter
        gfm: true     // Bật Github Flavored Markdown
    });

    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiEndpointInput = document.getElementById('apiEndpoint');
    const apiKeyInput = document.getElementById('apiKey');

    // Mảng lưu lịch sử chat (stateless => gửi lại toàn bộ array mỗi lần request)
    let messages = [
        { role: 'system', content: 'You are a helpful assistant.' }
    ];

    function appendMessage(role, content, isMarkdown = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role === 'user' ? 'user' : 'bot'}`;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
        
        if (isMarkdown && role === 'bot') {
            msgDiv.innerHTML = marked.parse(content);
        } else {
            msgDiv.textContent = content;
        }

        wrapper.appendChild(msgDiv);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        const endpoint = apiEndpointInput.value.trim();
        const apiKey = apiKeyInput.value.trim();

        // Cập nhật UI
        appendMessage('user', text);
        messages.push({ role: 'user', content: text });
        messageInput.value = '';
        
        sendBtn.disabled = true;
        
        // Tạo typing indicator
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper bot typing-wrapper';
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-msg';
        typingDiv.innerHTML = '<span class="typing-indicator">Đang xử lý</span>';
        wrapper.appendChild(typingDiv);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'default',
                    messages: messages,
                    stream: true,
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            // Xóa typing indicator và chuẩn bị thẻ cho markdown
            wrapper.remove();
            
            const botWrapper = document.createElement('div');
            botWrapper.className = 'message-wrapper bot';
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot-msg';
            botWrapper.appendChild(botMsgDiv);
            chatBox.appendChild(botWrapper);

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let botReply = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.trim() === 'data: [DONE]') continue;
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.choices && data.choices[0].delta && data.choices[0].delta.content) {
                                botReply += data.choices[0].delta.content;
                                // Render markdown
                                botMsgDiv.innerHTML = marked.parse(botReply);
                                chatBox.scrollTop = chatBox.scrollHeight;
                                
                                // Yield to browser paint to prevent UI freezing (nổ bùm)
                                await new Promise(resolve => requestAnimationFrame(resolve));
                            }
                        } catch (e) {
                            console.warn("Parse stream chunk error:", e, line);
                        }
                    }
                }
            }

            // Lưu reply vào lịch sử
            if (botReply.trim() !== '') {
                messages.push({ role: 'assistant', content: botReply });
            }

        } catch (error) {
            console.error(error);
            const typingWrapper = chatBox.querySelector('.typing-wrapper');
            if(typingWrapper) typingWrapper.remove();
            
            const errWrapper = document.createElement('div');
            errWrapper.className = 'message-wrapper bot';
            const errMsg = document.createElement('div');
            errMsg.className = 'message bot-msg bg-danger text-white border-danger';
            errMsg.textContent = `[Lỗi] ${error.message}`;
            errWrapper.appendChild(errMsg);
            chatBox.appendChild(errWrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        } finally {
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
