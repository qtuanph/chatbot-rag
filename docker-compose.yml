services:
  api:
    image: chatbot-rag-app:latest
    pull_policy: build
    build:
      context: .
      args:
        - BUILDKIT_INLINE_CACHE=1
    env_file:
      - .env
    secrets:
      - hf_token
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
    entrypoint: [ "/bin/bash", "/app/ops/entrypoint-api.sh" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
      ai-proxy:
        condition: service_healthy
      rustfs:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api/v1`) && !PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.middlewares=api-ratelimit@docker"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  workers:
    image: chatbot-rag-app:latest
    # Shares the same image as api — no separate build needed
    env_file:
      - .env
    secrets:
      - hf_token
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
    entrypoint: [ "/bin/bash", "/app/ops/entrypoint-worker.sh" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
      rustfs:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu, utility, compute ]
    networks:
      - internal

  ai-engine:
    image: chatbot-rag-app:latest
    env_file:
      - .env
    secrets:
      - hf_token
    entrypoint: [ "/bin/bash", "/app/ops/entrypoint-ai-engine.sh" ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu, utility, compute ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 30s
      retries: 60
      start_period: 300s
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
    restart: unless-stopped
    networks:
      - internal

  ai-proxy:
    image: decolua/9router:latest
    container_name: chatbot-rag-ai-proxy
    env_file:
      - .env
    environment:
      PORT: 2908
      HOSTNAME: 0.0.0.0
      DATA_DIR: /app/data
      JWT_SECRET: ${AI_PROXY_JWT_SECRET}
      INITIAL_PASSWORD: ${AI_PROXY_INITIAL_PASSWORD:-123456}
      NODE_ENV: production
      BASE_URL: http://localhost:2908
      NEXT_PUBLIC_BASE_URL: http://localhost:2908
      REQUIRE_API_KEY: "false"
      AUTH_COOKIE_SECURE: "false"
    ports:
      - "127.0.0.1:2908:2908"
    volumes:
      - 9router-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2908/api/health > /dev/null 2>&1 || wget -qO- http://127.0.0.1:2908/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:18.4-trixie  # 2026-05-14: 11 CVEs (CVE-2026-6637 code execution, SQL injection)
    command:
      - postgres
      - -c
      - timezone=Asia/Ho_Chi_Minh
      - -c
      - log_timezone=Asia/Ho_Chi_Minh
      - -c
      - app.app_rw_password=${APP_DB_PASSWORD:-replace-me}
      - -c
      - app.db_admin_password=${POSTGRES_PASSWORD:-replace-me}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragbot}
      POSTGRES_USER: ${POSTGRES_USER:-db-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-replace-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./ops/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:8-alpine
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "if [ -z \"$REDIS_PASSWORD\" ]; then redis-cli ping; else redis-cli -a \"$REDIS_PASSWORD\" ping; fi" ]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfs-admin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-replace-me}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfsdata:/data
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    shm_size: '2gb'
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

  webapp:
    image: chatbot-rag-webapp:latest
    pull_policy: build
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    environment:
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-random-string-at-least-32-chars}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/bep}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:8000/api/v1}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webapp.rule=Host(`localhost`)"
      - "traefik.http.routers.webapp.entrypoints=web"
      - "traefik.http.routers.webapp.priority=1"
      - "traefik.http.routers.webapp.service=webapp-svc"
      - "traefik.http.services.webapp-svc.loadbalancer.server.port=3000"
      - "traefik.http.routers.api-bep.rule=PathPrefix(`/api/bep`)"
      - "traefik.http.routers.api-bep.entrypoints=web"
      - "traefik.http.routers.api-bep.service=api-bep-svc"
      - "traefik.http.services.api-bep-svc.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v3.7.1
    command:
      - "--api.insecure=true"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=chatbot-rag_internal"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.encodedCharacters.allowEncodedSlash=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      api:
        condition: service_healthy
      webapp:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  rustfsdata:
  qdrantdata:
  hf-cache:
  9router-data:

networks:
  internal:
    driver: bridge

# HF_TOKEN is read from the environment (set via .env).
# The secret is mounted at /run/secrets/hf_token inside containers.
# Entrypoints read it with: export HF_TOKEN=$(cat /run/secrets/hf_token | tr -d '\r\n')
secrets:
  hf_token:
    environment: HF_TOKEN
