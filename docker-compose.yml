services:
  api:
    image: chatbot-rag-app:latest
    build:
      context: .
      secrets:
        - hf_token
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/app/ops/entrypoint-api.sh"]
    # No published port — all traffic goes through nginx on port 80
    # Internal access via Docker network: api:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  upload-pipeline:
    image: chatbot-rag-app:latest
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/app/ops/entrypoint-worker.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    shm_size: '2gb'
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
    restart: on-failure:3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute]
    networks:
      - internal

  cleanup-pipeline:
    image: chatbot-rag-app:latest
    env_file:
      - .env
    environment:
      - CELERY_INCLUDE=cleanup
    command: >
      celery -A app.core.celery_app.celery_app worker
      --loglevel=INFO
      --queues=cleanup,default
      -B
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:18.3-trixie
    command:
      - postgres
      - -c
      - app.app_rw_password=${APP_DB_PASSWORD:-replace-me}
      - -c
      - app.db_admin_password=${POSTGRES_PASSWORD:-replace-me}
      - -c
      - timezone=Asia/Ho_Chi_Minh
      - -c
      - log_timezone=Asia/Ho_Chi_Minh
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragbot}
      POSTGRES_USER: ${POSTGRES_USER:-db-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./ops/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db-admin} -d ${POSTGRES_DB:-ragbot}"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:8.6.2-trixie
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfs-admin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-replace-me}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/127.0.0.1/6333'"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  webapp:
    image: chatbot-rag-webapp:latest
    build:
      context: ./webapp
      dockerfile: Dockerfile
    # No published port — all traffic goes through nginx on port 80
    # Internal access via Docker network: webapp:3000
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-random-string-at-least-32-chars}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/bep}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:8000/api/v1}
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:stable-alpine3.23-perl
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      webapp:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  rustfsdata:
  qdrantdata:
  hf-cache:

networks:
  internal:
    driver: bridge

secrets:
  hf_token:
    environment: HF_TOKEN
