services:
  api:
    image: chatbot-rag-app:latest
    pull_policy: build
    build:
      context: .
      secrets:
        - hf_token
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/app/ops/entrypoint-api.sh"]
    # No published port — all traffic goes through nginx on port 80
    # Internal access via Docker network: api:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${API_CPU_LIMIT:-2.0}
          memory: ${API_MEM_LIMIT:-4G}
        reservations:
          cpus: ${API_CPU_RESERVATION:-0.5}
          memory: ${API_MEM_RESERVATION:-1G}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  workers:
    image: chatbot-rag-app:latest
    # Shares the same image as api — no separate build needed
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/app/ops/entrypoint-worker.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${WORKER_CPU_LIMIT:-2.0}
          memory: ${WORKER_MEM_LIMIT:-4G}
        reservations:
          cpus: ${WORKER_CPU_RESERVATION:-0.5}
          memory: ${WORKER_MEM_RESERVATION:-1G}
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ai-engine:
    image: chatbot-rag-app:latest
    env_file:
      - .env
    entrypoint: ["python", "-m", "app.modules.inference.server"]
    deploy:
      resources:
        limits:
          cpus: ${AI_ENGINE_CPU_LIMIT:-4.0}
          memory: ${AI_ENGINE_MEM_LIMIT:-8G}
        reservations:
          cpus: ${AI_ENGINE_CPU_RESERVATION:-1.0}
          memory: ${AI_ENGINE_MEM_RESERVATION:-2G}
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute]
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  db:
    image: postgres:18.3-trixie
    command:
      - postgres
      - -c
      - timezone=Asia/Ho_Chi_Minh
      - -c
      - log_timezone=Asia/Ho_Chi_Minh
      - -c
      - app.app_rw_password=${APP_DB_PASSWORD:-replace-me}
      - -c
      - app.db_admin_password=${POSTGRES_PASSWORD:-replace-me}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragbot}
      POSTGRES_USER: ${POSTGRES_USER:-db-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-replace-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./ops/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db-admin} -d ${POSTGRES_DB:-ragbot}"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:8.8-m03-alpine
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-} ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfs-admin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-replace-me}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/v1/readyz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  webapp:
    image: chatbot-rag-webapp:latest
    pull_policy: build
    build:
      context: ./webapp
      dockerfile: Dockerfile
    # No published port — all traffic goes through nginx on port 80
    # Internal access via Docker network: webapp:3000
    environment:
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-random-string-at-least-32-chars}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/bep}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:8000/api/v1}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      webapp:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  rustfsdata:
  qdrantdata:
  hf-cache:

networks:
  internal:
    driver: bridge

secrets:
  hf_token:
    environment: HF_TOKEN
