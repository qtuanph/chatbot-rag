name: chatbot-rag
services:
  api:
    image: chatbot-rag-app:latest
    pull_policy: build
    build:
      context: .
      args:
        - BUILDKIT_INLINE_CACHE=1
    env_file:
      - .env
    environment:
      - HF_HOME=/home/qtuanph/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/home/qtuanph/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/home/qtuanph/.cache/huggingface/fastembed
    secrets:
      - hf_token
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
      - settings-data:/app/data
    entrypoint: [ "/bin/bash", "/app/ops/entrypoint-api.sh" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ai-proxy:
        condition: service_healthy
      rustfs:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      # — All traffic from api.qtuanph.dev goes to API
      - "traefik.http.routers.api.rule=Host(`api.qtuanph.dev`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      # — SSE: disable response buffering so stream chunks reach browser immediately
      - "traefik.http.middlewares.api-sse.headers.customResponseHeaders.X-Accel-Buffering=no"
      - "traefik.http.middlewares.api-sse.headers.customResponseHeaders.Cache-Control=no-cache, no-transform"
      - "traefik.http.middlewares.api-sse.headers.customResponseHeaders.Connection=keep-alive"
      - "traefik.http.routers.api.middlewares=api-ratelimit@docker,api-sse@docker"

  workers:
    image: chatbot-rag-app:latest
    env_file:
      - .env
    environment:
      - HF_HOME=/home/qtuanph/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/home/qtuanph/.cache/huggingface
      - FASTEMBED_CACHE_PATH=/home/qtuanph/.cache/huggingface/fastembed
    secrets:
      - hf_token
    volumes:
      - hf-cache:/home/qtuanph/.cache/huggingface
      - settings-data:/app/data
    entrypoint: [ "/bin/bash", "/app/ops/entrypoint-worker.sh" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      rustfs:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"

  ai-proxy:
    image: decolua/9router:latest
    container_name: chatbot-rag-ai-proxy
    env_file:
      - .env
    environment:
      PORT: 2908
      HOSTNAME: 0.0.0.0
      DATA_DIR: /app/data
      JWT_SECRET: ${AI_PROXY_JWT_SECRET}
      INITIAL_PASSWORD: ${AI_PROXY_INITIAL_PASSWORD:-123456}
      NODE_ENV: production
      BASE_URL: http://localhost:2908
      NEXT_PUBLIC_BASE_URL: http://localhost:2908
      REQUIRE_API_KEY: "false"
      AUTH_COOKIE_SECURE: "false"
    ports:
      - "127.0.0.1:2908:2908"
    volumes:
      - 9router-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2908/api/health > /dev/null 2>&1 || wget -qO- http://127.0.0.1:2908/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:18.4-trixie
    command:
      - postgres
      - -c
      - timezone=Asia/Ho_Chi_Minh
      - -c
      - log_timezone=Asia/Ho_Chi_Minh
      - -c
      - app.app_rw_password=${APP_DB_PASSWORD:-replace-me}
      - -c
      - app.db_admin_password=${POSTGRES_PASSWORD:-replace-me}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragbot}
      POSTGRES_USER: ${POSTGRES_USER:-db-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-replace-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./ops/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:8.8.0-trixie
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "if [ -z \"$REDIS_PASSWORD\" ]; then redis-cli ping; else redis-cli -a \"$REDIS_PASSWORD\" ping; fi" ]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfs-admin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-replace-me}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfsdata:/data
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    shm_size: '2gb'
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal

  traefik:
    image: traefik:v3.7.5
    command:
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=chatbot-rag_internal"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=0s"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=0s"
      - "--entrypoints.web.transport.respondingTimeouts.idleTimeout=600s"
      - "--serversTransport.forwardingTimeouts.responseHeaderTimeout=0s"
      - "--serversTransport.forwardingTimeouts.idleConnTimeout=600s"
      - "--entrypoints.web.http.encodedCharacters.allowEncodedSlash=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  rustfsdata:
  qdrantdata:
  hf-cache:
  9router-data:
  settings-data:

networks:
  internal:
    driver: bridge

secrets:
  hf_token:
    environment: HF_TOKEN